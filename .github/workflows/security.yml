name: Security

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: "0 6 * * 1"

concurrency:
  group: security-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  deny:
    name: cargo-deny
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - name: Install pinned toolchain
        run: rustup show active-toolchain || rustup toolchain install
      - name: Install cargo-deny
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-deny@0.14.24
      - name: Enforce 5-crate runtime allow-list
        run: cargo deny check bans licenses sources

  audit:
    name: cargo-audit
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - name: Install pinned toolchain
        run: rustup show active-toolchain || rustup toolchain install
      - name: Install cargo-audit
        # 0.20.0 cannot parse CVSS 4.0 severity strings, which the
        # advisory database started emitting in 2026 (e.g.
        # RUSTSEC-2026-0073). 0.22+ supports them.
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-audit@0.22.1
      - run: cargo audit
