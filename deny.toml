[advisories]
version = 2
ignore = []

[licenses]
version = 2
allow = [
    "MIT",
    "Apache-2.0",
    "ISC",
    "CC0-1.0",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "OpenSSL",
    "Unicode-DFS-2016",
    "Unicode-3.0",
]

[bans]
multiple-versions = "deny"
deny = [
    { name = "tokio" },
    { name = "async-std" },
    { name = "mio" },
    { name = "hyper" },
    { name = "reqwest" },
    { name = "clap" },
    { name = "serde" },
    { name = "serde_json" },
    { name = "toml" },
    { name = "log" },
    { name = "tracing" },
    { name = "rustls" },
    { name = "anyhow" },
    { name = "thiserror" },
    { name = "arc-swap" },
    { name = "once_cell" },
    { name = "parking_lot" },
    { name = "crossbeam" },
    { name = "zeroize" },
    { name = "base64" },
    { name = "hex" },
]
